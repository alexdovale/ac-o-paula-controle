<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mesa de Trabalho Judicial - SIGEP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/jwt-decode@4.0.0/build/esm/index.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script type="text/javascript">
        (function() { emailjs.init("aGL-Q2UJcD2tDpUKq"); })();
    </script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .tab-active { border-bottom: 3px solid #16a34a; color: #16a34a; font-weight: bold; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="p-2 md:p-6 min-h-screen flex justify-center items-start pt-4 sm:pt-10">

    <div class="w-full max-w-4xl bg-white rounded-2xl shadow-2xl overflow-hidden flex flex-col border border-slate-200">
        <div id="header-bg" class="bg-slate-800 p-5 text-white transition-all duration-500 flex items-center gap-4 relative overflow-hidden">
            <div class="absolute top-0 right-0 w-48 h-48 bg-blue-500 opacity-10 rounded-full blur-2xl -mr-10 -mt-10 pointer-events-none"></div>
            
            <div class="flex flex-col overflow-hidden w-full relative z-10">
                <h1 id="assistido-nome" class="font-black text-xl uppercase truncate tracking-tight">CARREGANDO ATENDIMENTO...</h1>
                <p id="assistido-assunto" class="text-xs text-blue-200 opacity-90 truncate mt-1 font-semibold uppercase tracking-wider">Aguarde a sincronização de segurança...</p>
            </div>

            <!-- Indicador de Status "Livre" -->
            <div id="status-indicator" class="hidden absolute top-4 right-4 bg-emerald-500 text-white text-[9px] font-black px-2 py-1 rounded-full shadow-lg border border-emerald-400 uppercase tracking-widest animate-pulse z-20">
                🟢 LIVRE
            </div>
        </div>

        <div class="flex border-b bg-slate-50 select-none border-slate-200 font-semibold text-xs tracking-wider">
            <button id="tab-btn-encerramento" class="flex-1 p-4 text-center font-black uppercase text-slate-800 border-b-2 border-slate-800 transition-colors focus:outline-none">Encerramento / Fluxo</button>
            <button id="tab-btn-historico" class="flex-1 p-4 text-center font-bold uppercase text-slate-400 border-b-2 border-transparent hover:text-slate-600 transition-colors focus:outline-none">Histórico Recepção</button>
        </div>

        <div class="p-4 sm:p-6 bg-white flex-1">
            
            <div id="aba-encerramento" class="space-y-6">
                <div id="area-colaborador" class="hidden">
                    <div class="flex flex-col justify-center items-center py-20 gap-3">
                        <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-slate-800"></div>
                        <p class="text-[10px] font-black text-slate-400 tracking-widest uppercase">Construindo Mesa Judicial...</p>
                    </div>
                </div>
            </div>

            <div id="aba-historico" class="hidden animate-fade-in">
                <div id="lista-historico" class="space-y-4">
                    <div class="flex flex-col justify-center items-center py-20 gap-3">
                        <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-indigo-600"></div>
                        <p class="text-[10px] font-black text-indigo-400 tracking-widest uppercase">Puxando documentos da recepção...</p>
                    </div>
                </div>
            </div>
            
        </div>
        
        <div class="bg-slate-50 px-6 py-3 border-t border-slate-100 flex justify-between items-center text-[10px] font-semibold text-slate-400 shrink-0 select-none">
            <span>SIGEP • Mesa Unificada de Trabalho</span>
            <span class="font-mono text-[9px]">v1.2.0-2026</span>
        </div>
    </div>

    <script type="module">
        import { AtendimentoExternoService } from './js/atendimentoExternoService.js';
        document.addEventListener('DOMContentLoaded', () => {
            AtendimentoExternoService.init();
        });
    </script>
</body>
</html>
