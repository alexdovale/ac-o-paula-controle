<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Painel de Atendimento - SIGEP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/jwt-decode@4.0.0/build/esm/index.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
        (function() { emailjs.init("aGL-Q2UJcD2tDpUKq"); })();
    </script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .tab-active { border-bottom: 3px solid #16a34a; color: #16a34a; font-weight: bold; }
        
        /* Custom scrollbar para a caixinha de demandas adicionais móvel */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="p-2 md:p-6 min-h-screen flex justify-center items-start pt-4 sm:pt-10">

    <div class="w-full max-w-4xl bg-white rounded-xl shadow-2xl overflow-hidden flex flex-col">
        <div id="header-bg" class="bg-slate-800 p-5 text-white transition-colors duration-300">
            <h1 id="assistido-nome" class="font-black text-xl uppercase truncate">CARREGANDO...</h1>
            <p id="assistido-assunto" class="text-xs opacity-90 truncate mt-1">Aguarde...</p>
        </div>

        <div class="flex border-b bg-gray-50 select-none">
            <button id="tab-btn-encerramento" class="flex-1 p-3.5 text-center font-black text-[11px] uppercase tracking-widest text-slate-800 border-b-2 border-slate-800 transition-colors">Encerramento / Fluxo</button>
            <button id="tab-btn-historico" class="flex-1 p-3.5 text-center font-bold text-[11px] uppercase tracking-widest text-slate-400 border-b-2 border-transparent hover:text-slate-600 transition-colors">Histórico Recepção</button>
        </div>

        <div class="p-4 sm:p-6">
            <div id="aba-encerramento" class="space-y-6">
                <div id="area-colaborador" class="hidden">
                    <div class="flex justify-center py-10">
                        <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-slate-800"></div>
                    </div>
                </div>
            </div>

            <div id="aba-historico" class="hidden animate-fade-in">
                <div id="lista-historico" class="space-y-4">
                    <div class="flex justify-center py-10">
                        <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-indigo-600"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { AtendimentoExternoService } from './js/atendimentoExternoService.js';
        document.addEventListener('DOMContentLoaded', () => {
            AtendimentoExternoService.init();
        });
    </script>
</body>
</html>
