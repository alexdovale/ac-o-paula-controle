<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Painel da Recepção — SIGEP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'DM Sans', sans-serif; }
        code, .mono { font-family: 'DM Mono', monospace; }

        body { background: #0d1117; min-height: 100vh; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }

        /* Tick animado — indicador ao vivo */
        @keyframes ping-slow {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(1.6); }
        }
        .ping-slow { animation: ping-slow 2s ease-in-out infinite; }

        /* Entrada do chamado */
        @keyframes chamado-enter {
            from { opacity: 0; transform: translateY(-20px) scale(0.96); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes flash-glow {
            0%   { box-shadow: 0 0 0 0 rgba(251,191,36,0); }
            30%  { box-shadow: 0 0 0 18px rgba(251,191,36,0.25); }
            100% { box-shadow: 0 0 0 0 rgba(251,191,36,0); }
        }
        @keyframes card-in {
            from { opacity: 0; transform: translateX(-10px); }
            to   { opacity: 1; transform: translateX(0); }
        }
        @keyframes fade-up {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .anim-chamado  { animation: chamado-enter 0.5s cubic-bezier(0.22,1,0.36,1) forwards; }
        .anim-glow     { animation: flash-glow 1.1s ease-out forwards; }
        .anim-card     { animation: card-in 0.3s ease-out forwards; }
        .anim-fade-up  { animation: fade-up 0.4s ease-out forwards; }

        /* Card de pessoa na fila */
        .pessoa-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-left: 4px solid #f59e0b;
            border-radius: 12px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
            transition: background 0.2s;
        }
        .pessoa-card.em-atendimento {
            border-left-color: #6366f1;
            background: #1a1f3a;
        }

        /* Badge de sala/pauta */
        .sala-badge {
            background: #161d2a;
            border: 1px solid #475569;
            color: #94a3b8;
            font-size: 10px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 6px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            white-space: nowrap;
        }

        /* Colunas principais unificadas */
        .coluna-unificada {
            background: #161d2a;
            border: 1px solid #1e293b;
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .coluna-header {
            padding: 16px 20px;
            background: #1e293b;
            border-bottom: 1px solid #334155;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        /* Gradiente de texto para o nome chamado */
        .nome-chamado {
            background: linear-gradient(90deg, #fbbf24, #f97316);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Pill contador */
        .pill {
            padding: 4px 12px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.02em;
        }
    </style>
</head>
<body class="p-3 sm:p-5 md:p-8 flex flex-col min-h-screen">

    <div id="loading" class="fixed inset-0 bg-[#0d1117] flex flex-col items-center justify-center z-50 gap-4">
        <div class="w-12 h-12 rounded-full border-2 border-transparent border-t-amber-500 animate-spin"></div>
        <p class="text-slate-500 text-xs font-bold uppercase tracking-widest">Conectando ao SIGEP...</p>
    </div>

    <div id="app" class="hidden w-full max-w-screen-2xl mx-auto flex-1 flex flex-col gap-5 h-full">

        <header class="flex flex-col sm:flex-row items-center justify-between gap-4 bg-[#161d2a] border border-[#1e293b] rounded-2xl px-6 py-4 shrink-0">
            <div class="flex items-center gap-4">
                <div class="bg-[#0d1117] border border-[#334155] rounded-xl p-2 shrink-0">
                    <img src="https://raw.githubusercontent.com/alexdovale/ac-o-paula-controle/main/imagem.png" alt="Logo SIGEP" class="h-9 w-auto object-contain">
                </div>
                <div>
                    <div class="flex items-center gap-2">
                        <h1 class="text-white font-black text-xl tracking-tight leading-none">SIGEP</h1>
                        <span class="text-slate-600 text-xs font-bold">·</span>
                        <span class="text-slate-400 text-xs font-bold uppercase tracking-widest">Painel de Atendimento</span>
                    </div>
                    <h2 id="recepcao-nome" class="text-amber-400 font-black text-lg leading-tight mt-0.5 tracking-tight">—</h2>
                </div>
            </div>

            <div class="flex items-center gap-4 flex-wrap justify-center sm:justify-end">
                <div class="flex items-center gap-2">
                    <span class="relative flex h-2.5 w-2.5">
                        <span class="ping-slow absolute h-full w-full rounded-full bg-green-400 opacity-60"></span>
                        <span class="relative rounded-full h-2.5 w-2.5 bg-green-500"></span>
                    </span>
                    <span class="text-green-400 text-[10px] font-black uppercase tracking-widest">Ao Vivo</span>
                </div>
                <div class="h-5 w-px bg-[#334155]"></div>
                <div class="text-center">
                    <p class="text-amber-400 font-black text-2xl leading-none" id="g-aguardando">0</p>
                    <p class="text-slate-500 text-[9px] font-bold uppercase tracking-widest mt-0.5">Aguardando</p>
                </div>
                <div class="text-center">
                    <p class="text-indigo-400 font-black text-2xl leading-none" id="g-atendendo">0</p>
                    <p class="text-slate-500 text-[9px] font-bold uppercase tracking-widest mt-0.5">Atendendo</p>
                </div>
                <div id="data-hora" class="mono text-slate-500 text-xs font-bold bg-[#0d1117] border border-[#1e293b] px-3 py-1.5 rounded-lg"></div>
            </div>
        </header>

        <div id="ultimo-chamado-wrap" class="hidden shrink-0">
            <div id="ultimo-chamado-card" class="bg-[#161d2a] border border-[#334155] rounded-2xl p-6 md:p-8 flex flex-col md:flex-row items-center gap-6 relative overflow-hidden">
                <div class="absolute inset-0 pointer-events-none" style="background: radial-gradient(ellipse at 50% 0%, rgba(251,191,36,0.07) 0%, transparent 70%)"></div>
                <div class="text-center md:text-left flex-1">
                    <p class="text-amber-500 text-[10px] font-black uppercase tracking-[0.35em] mb-3">📣 Chamando Agora</p>
                    <h2 id="uc-nome" class="nome-chamado text-5xl sm:text-6xl font-black uppercase tracking-tight leading-none mb-4">—</h2>
                    <div class="flex flex-wrap gap-2 justify-center md:justify-start">
                        <span id="uc-pauta" class="bg-[#1e293b] border border-[#334155] text-slate-300 text-sm font-bold px-4 py-1.5 rounded-xl">—</span>
                        <span id="uc-local" class="bg-amber-500/20 border border-amber-500/40 text-amber-300 text-sm font-bold px-4 py-1.5 rounded-xl">—</span>
                        <span id="uc-hora"  class="mono text-slate-500 text-xs font-bold self-center">—</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="flex flex-col md:flex-row gap-6 flex-1 min-h-[400px]">
            
            <div class="coluna-unificada w-full md:w-1/3">
                <div class="coluna-header">
                    <div>
                        <p class="text-indigo-400 font-black text-sm uppercase tracking-widest">🧑‍💻 Em Atendimento</p>
                        <p class="text-slate-500 text-[10px] font-bold mt-1">Sendo atendidos neste momento</p>
                    </div>
                </div>
                <div id="lista-atendimento" class="flex-1 overflow-y-auto p-4 space-y-3 bg-[#0d1117]">
                    </div>
            </div>

            <div class="coluna-unificada w-full md:w-2/3">
                <div class="coluna-header">
                    <div>
                        <p class="text-amber-400 font-black text-sm uppercase tracking-widest">⏳ Fila de Espera Geral</p>
                        <p class="text-slate-500 text-[10px] font-bold mt-1">Aguardando chamada</p>
                    </div>
                </div>
                <div id="lista-espera" class="flex-1 overflow-y-auto p-4 space-y-3 bg-[#0d1117] grid grid-cols-1 md:grid-cols-2 gap-3 items-start content-start">
                    </div>
            </div>

        </div>

        <footer class="text-center text-slate-700 text-[10px] font-bold uppercase tracking-widest pb-2 shrink-0">
            SIGEP · Painel Público da Recepção Unificada · Dados em tempo real
        </footer>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ── Firebase Config ──
        const firebaseConfig = {
            apiKey: "AIzaSyCrLwXmkxgeVoB8TwRI7pplCVQETGK0zkE",
            authDomain: "pauta-ce162.firebaseapp.com",
            projectId: "pauta-ce162",
            storageBucket: "pauta-ce162.appspot.com",
            messagingSenderId: "87113750208",
            appId: "1:87113750208:web:4abba0024f4d4af699bf25"
        };
        const firebaseApp = initializeApp(firebaseConfig);
        const db = getFirestore(firebaseApp);

        // ── Params ──
        const params  = new URLSearchParams(window.location.search);
        const pautasParam  = params.get('pautas');
        let recepcaoNome = params.get('nome') || 'Recepção Geral';

        const estado = {
            pautas: {},
            assistidos: {},
            ultimoChamado: null,
        };

        function esc(str) {
            if (!str) return '';
            return String(str).replace(/[&<>'"]/g, t => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[t]||t));
        }

        function horaAgora() {
            return new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
        }

        function tickRelogio() {
            const el = document.getElementById('data-hora');
            if (el) el.textContent = new Date().toLocaleString('pt-BR', { weekday: 'short', day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit' }).replace(',', ' ·');
        }
        setInterval(tickRelogio, 1000); tickRelogio();

        function tocarSom() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const notas = [[523,0,0.22],[659,0.22,0.22],[784,0.44,0.35]];
                notas.forEach(([f, i, d]) => {
                    const o = ctx.createOscillator(), g = ctx.createGain();
                    o.connect(g); g.connect(ctx.destination);
                    o.type = 'sine'; o.frequency.setValueAtTime(f, ctx.currentTime + i);
                    g.gain.setValueAtTime(0.35, ctx.currentTime + i);
                    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i + d);
                    o.start(ctx.currentTime + i); o.stop(ctx.currentTime + i + d);
                });
                setTimeout(() => ctx.close(), 1400);
            } catch(e) {}
        }

        function renderUltimoChamado(chamado) {
            if (!chamado) return;
            const wrap = document.getElementById('ultimo-chamado-wrap');
            const card = document.getElementById('ultimo-chamado-card');
            const nomeMudou = document.getElementById('uc-nome').textContent !== chamado.nome.toUpperCase();

            wrap.classList.remove('hidden');
            document.getElementById('uc-nome').textContent  = chamado.nome.toUpperCase();
            document.getElementById('uc-pauta').textContent = esc(chamado.pautaNome || chamado.local || '—');
            document.getElementById('uc-local').textContent = chamado.sala ? '🏠 ' + esc(chamado.sala) : '📋 ' + esc(chamado.local || '—');
            document.getElementById('uc-hora').textContent  = chamado.hora || horaAgora();

            if (nomeMudou) {
                document.getElementById('uc-nome').classList.remove('anim-chamado'); card.classList.remove('anim-glow');
                void card.offsetWidth;
                document.getElementById('uc-nome').classList.add('anim-chamado'); card.classList.add('anim-glow');
                tocarSom();
            }
        }

        // ── LÓGICA PRINCIPAL: RENDERIZAÇÃO UNIFICADA ──
        function renderPainelUnificado() {
            let todosAguardando = [];
            let todosEmAtendimento = [];
            let concluidos = 0;

            // Achata (flatten) todos os dados de todas as pautas em listas únicas
            for (const pautaId in estado.assistidos) {
                const pauta = estado.pautas[pautaId];
                const lista = estado.assistidos[pautaId] || [];
                
                lista.forEach(a => {
                    // Adicionamos as informações da pauta pai para mostrar no card
                    const pessoaContexto = { 
                        ...a, 
                        nomePauta: pauta?.name || 'Geral', 
                        salaPauta: pauta?.sala || a.room || ''
                    };

                    if (a.status === 'aguardando') todosAguardando.push(pessoaContexto);
                    else if (a.status === 'emAtendimento') todosEmAtendimento.push(pessoaContexto);
                    else if (a.status === 'atendido') concluidos++;
                });
            }

            // Atualiza Top Bar Contadores
            document.getElementById('g-aguardando').textContent = todosAguardando.length;
            document.getElementById('g-atendendo').textContent = todosEmAtendimento.length;
            document.getElementById('g-atendidos').textContent = concluidos;

            // Ordena Fila (Prioridade URGENTE primeiro, depois ordem normal)
            todosAguardando.sort((a, b) => {
                if (a.priority === 'URGENTE' && b.priority !== 'URGENTE') return -1;
                if (b.priority === 'URGENTE' && a.priority !== 'URGENTE') return 1;
                return (a.checkInOrder || 0) - (b.checkInOrder || 0);
            });

            // Ordena Atendimentos (Mais recentes no topo)
            todosEmAtendimento.sort((a,b) => new Date(b.inAttendanceTime||0) - new Date(a.inAttendanceTime||0));

            // Renderiza Em Atendimento
            const listaAtendimentoEl = document.getElementById('lista-atendimento');
            if (todosEmAtendimento.length === 0) {
                listaAtendimentoEl.innerHTML = `<p class="text-slate-600 text-xs font-bold uppercase text-center mt-10">Nenhum atendimento no momento</p>`;
            } else {
                listaAtendimentoEl.innerHTML = todosEmAtendimento.map(a => `
                    <div class="pessoa-card em-atendimento anim-fade-up !mb-0">
                        <div class="min-w-0 flex-1">
                            <p class="text-white font-bold text-lg truncate uppercase">${esc(a.name)}</p>
                            <p class="text-indigo-400 text-[11px] font-bold mt-1 uppercase tracking-wider">${esc(a.nomePauta)}</p>
                        </div>
                        ${a.salaPauta ? `<span class="sala-badge border-indigo-500/30 text-indigo-300 bg-indigo-900/20">${esc(a.salaPauta)}</span>` : ''}
                    </div>
                `).join('');
            }

            // Renderiza Fila de Espera (Em Grid para aproveitar espaço lateral)
            const listaEsperaEl = document.getElementById('lista-espera');
            if (todosAguardando.length === 0) {
                listaEsperaEl.innerHTML = `<div class="col-span-full"><p class="text-slate-600 text-xs font-bold uppercase text-center mt-10">Fila vazia</p></div>`;
            } else {
                listaEsperaEl.innerHTML = todosAguardando.map((a, i) => `
                    <div class="pessoa-card anim-card !mb-0" style="animation-delay:${i*0.03}s">
                        <span class="text-amber-500 font-black text-sm mono w-6 shrink-0 text-center">${i+1}</span>
                        <div class="min-w-0 flex-1">
                            <p class="text-white font-bold text-base truncate uppercase">${esc(a.name)}</p>
                            <p class="text-slate-500 text-[10px] font-bold mt-0.5 truncate uppercase tracking-widest">${esc(a.nomePauta)}</p>
                        </div>
                        ${a.priority === 'URGENTE' 
                            ? `<span class="pill bg-red-900/60 text-red-400 border border-red-800/50">URGENTE</span>` 
                            : ''}
                    </div>
                `).join('');
            }
        }

        async function init() {
            if (!pautasParam) return;
            const pautaIds = pautasParam.split(',').map(s => s.trim()).filter(Boolean);
            if (pautaIds.length === 0) return;

            document.getElementById('recepcao-nome').textContent = decodeURIComponent(recepcaoNome);
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');

            pautaIds.forEach(pautaId => {
                // Escuta os dados gerais da pauta para pegar o nome da Unidade/Órgão e o nome da pauta
                onSnapshot(doc(db, "pautas", pautaId), (snap) => {
                    if (!snap.exists()) return;
                    const d = snap.data();
                    estado.pautas[pautaId] = { id: pautaId, ...d };
                    
                    if (d.unidade) {
                        document.getElementById('recepcao-nome').textContent = esc(d.unidade);
                    }
                    renderPainelUnificado();
                });

                // Escuta as pessoas na fila da pauta
                onSnapshot(collection(db, "pautas", pautaId, "attendances"), (snap) => {
                    estado.assistidos[pautaId] = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    renderPainelUnificado();
                });

                // Escuta o sistema de chamados (Painel Sonoro/Flash)
                onSnapshot(doc(db, "pautas", pautaId, "painel", "ultimoChamado"), (snap) => {
                    if (!snap.exists()) return;
                    const data = snap.data();
                    if (!data.atual) return;

                    const tsAtual = data.atual.timestamp || 0;
                    const tsUlt = estado.ultimoChamado?.timestamp || 0;

                    if (tsAtual >= tsUlt) {
                        estado.ultimoChamado = {
                            ...data.atual,
                            pautaNome: estado.pautas[pautaId]?.name || data.atual.local || '',
                            sala: estado.pautas[pautaId]?.sala || data.atual.sala || '',
                        };
                        renderUltimoChamado(estado.ultimoChamado);
                    }
                });
            });
        }
        init();
    </script>
</body>
</html>
