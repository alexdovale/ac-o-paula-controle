<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Painel da Recepção — SIGEP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        * { font-family: 'DM Sans', sans-serif; }
        code, .mono { font-family: 'DM Mono', monospace; }

        /* Fundo claro para o corpo da página */
        body { background: #f8fafc; min-height: 100vh; color: #0f172a; }

        /* Scrollbar suave e clara */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Tick animado — indicador ao vivo */
        @keyframes ping-slow {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(1.6); }
        }
        .ping-slow { animation: ping-slow 2s ease-in-out infinite; }

        /* Animações */
        @keyframes chamado-enter {
            from { opacity: 0; transform: translateY(-20px) scale(0.96); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes flash-glow {
            0%   { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0); }
            30%  { box-shadow: 0 0 0 15px rgba(245, 158, 11, 0.2); }
            100% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0); }
        }
        @keyframes card-in {
            from { opacity: 0; transform: translateX(-10px); }
            to   { opacity: 1; transform: translateX(0); }
        }
        @keyframes fade-up {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .anim-chamado  { animation: chamado-enter 0.5s cubic-bezier(0.22,1,0.36,1) forwards; }
        .anim-glow     { animation: flash-glow 1.1s ease-out forwards; }
        .anim-card     { animation: card-in 0.3s ease-out forwards; }
        .anim-fade-up  { animation: fade-up 0.4s ease-out forwards; }

        /* Card de pessoa na fila - Versão Clara */
        .pessoa-card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-left: 4px solid #f59e0b; /* Laranja/Amber */
            border-radius: 12px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
            transition: all 0.2s ease;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        }
        
        .pessoa-card:hover {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transform: translateY(-1px);
        }

        /* Card em atendimento - Destacado em azul */
        .pessoa-card.em-atendimento {
            border-left-color: #4f46e5; /* Indigo */
            background: #f5f8ff;
            border-color: #e0e7ff;
        }

        /* Badge de sala/pauta - Versão Clara */
        .sala-badge {
            background: #f1f5f9;
            border: 1px solid #cbd5e1;
            color: #475569;
            font-size: 10px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 6px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            white-space: nowrap;
        }

        /* Colunas principais unificadas */
        .coluna-unificada {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }
        .coluna-header {
            padding: 16px 20px;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        /* Gradiente de texto para o nome chamado - Ajustado para fundo branco */
        .nome-chamado {
            background: linear-gradient(90deg, #d97706, #ea580c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Pill contador */
        .pill {
            padding: 4px 12px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.02em;
        }
    </style>
</head>
<body class="p-3 sm:p-5 md:p-8 flex flex-col min-h-screen text-slate-800">

    <div id="loading" class="fixed inset-0 bg-slate-50 flex flex-col items-center justify-center z-50 gap-4">
        <div class="w-12 h-12 rounded-full border-4 border-slate-200 border-t-amber-500 animate-spin"></div>
        <p class="text-slate-500 text-xs font-bold uppercase tracking-widest">Conectando ao SIGEP...</p>
    </div>

    <div id="app" class="hidden w-full max-w-screen-2xl mx-auto flex-1 flex flex-col gap-5 h-full">

        <header class="flex flex-col sm:flex-row items-center justify-between gap-4 bg-white border border-slate-200 shadow-sm rounded-2xl px-6 py-4 shrink-0">
            <div class="flex items-center gap-4">
                <div class="bg-slate-50 border border-slate-200 rounded-xl p-2 shrink-0">
                    <img src="https://raw.githubusercontent.com/alexdovale/ac-o-paula-controle/main/imagem.png" alt="Logo SIGEP" class="h-9 w-auto object-contain drop-shadow-sm">
                </div>
                <div>
                    <div class="flex items-center gap-2">
                        <h1 class="text-slate-900 font-black text-xl tracking-tight leading-none">SIGEP</h1>
                        <span class="text-slate-300 text-xs font-bold">·</span>
                        <span class="text-slate-500 text-xs font-bold uppercase tracking-widest">Painel de Atendimento</span>
                    </div>
                    <h2 id="recepcao-nome" class="text-amber-600 font-black text-lg leading-tight mt-0.5 tracking-tight">—</h2>
                </div>
            </div>

            <div class="flex items-center gap-4 flex-wrap justify-center sm:justify-end">
                <div class="flex items-center gap-2 px-2">
                    <span class="relative flex h-2.5 w-2.5">
                        <span class="ping-slow absolute h-full w-full rounded-full bg-green-500 opacity-60"></span>
                        <span class="relative rounded-full h-2.5 w-2.5 bg-green-600"></span>
                    </span>
                    <span class="text-green-600 text-[10px] font-black uppercase tracking-widest">Ao Vivo</span>
                </div>
                <div class="h-8 w-px bg-slate-200"></div>
                <div class="text-center px-2">
                    <p class="text-amber-500 font-black text-2xl leading-none" id="g-aguardando">0</p>
                    <p class="text-slate-500 text-[9px] font-bold uppercase tracking-widest mt-0.5">Aguardando</p>
                </div>
                <div class="text-center px-2">
                    <p class="text-indigo-600 font-black text-2xl leading-none" id="g-atendendo">0</p>
                    <p class="text-slate-500 text-[9px] font-bold uppercase tracking-widest mt-0.5">Atendendo</p>
                </div>
                <div id="data-hora" class="mono text-slate-600 text-xs font-bold bg-slate-50 border border-slate-200 px-3 py-1.5 rounded-lg ml-2"></div>
            </div>
        </header>

        <div id="ultimo-chamado-wrap" class="hidden shrink-0">
            <div id="ultimo-chamado-card" class="bg-white border border-amber-200 shadow-md rounded-2xl p-6 md:p-8 flex flex-col md:flex-row items-center gap-6 relative overflow-hidden">
                <div class="absolute inset-0 pointer-events-none" style="background: radial-gradient(ellipse at 50% 0%, rgba(245, 158, 11, 0.05) 0%, transparent 70%)"></div>
                <div class="text-center md:text-left flex-1 relative z-10">
                    <p class="text-amber-600 text-[10px] font-black uppercase tracking-[0.35em] mb-3 flex items-center justify-center md:justify-start gap-2">
                        <span class="text-base">📣</span> Chamando Agora
                    </p>
                    <h2 id="uc-nome" class="nome-chamado text-5xl sm:text-6xl font-black uppercase tracking-tight leading-none mb-4">—</h2>
                    <div class="flex flex-wrap gap-2 justify-center md:justify-start">
                        <span id="uc-pauta" class="bg-slate-100 border border-slate-200 text-slate-700 text-sm font-bold px-4 py-1.5 rounded-xl">—</span>
                        <span id="uc-local" class="bg-amber-50 border border-amber-200 text-amber-800 text-sm font-bold px-4 py-1.5 rounded-xl">—</span>
                        <span id="uc-hora"  class="mono text-slate-500 text-xs font-bold self-center">—</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="flex flex-col md:flex-row gap-6 flex-1 min-h-[400px]">
            
            <!-- Coluna: Em Atendimento -->
            <div class="coluna-unificada w-full md:w-1/3 border-indigo-100">
                <div class="coluna-header bg-indigo-50/50 border-indigo-100">
                    <div>
                        <p class="text-indigo-600 font-black text-sm uppercase tracking-widest flex items-center gap-1.5">
                            <span>🧑‍💻</span> Em Atendimento
                        </p>
                        <p class="text-slate-500 text-[10px] font-bold mt-1">Sendo atendidos neste momento</p>
                    </div>
                </div>
                <!-- bg-slate-50 ao invés do tema preto, para contrastar com os cartões brancos -->
                <div id="lista-atendimento" class="flex-1 overflow-y-auto p-4 space-y-3 bg-slate-50">
                </div>
            </div>

            <!-- Coluna: Fila de Espera -->
            <div class="coluna-unificada w-full md:w-2/3 border-amber-100">
                <div class="coluna-header bg-amber-50/30 border-amber-100">
                    <div>
                        <p class="text-amber-600 font-black text-sm uppercase tracking-widest flex items-center gap-1.5">
                            <span>⏳</span> Fila de Espera Geral
                        </p>
                        <p class="text-slate-500 text-[10px] font-bold mt-1">Aguardando chamada</p>
                    </div>
                </div>
                <div id="lista-espera" class="flex-1 overflow-y-auto p-4 space-y-3 bg-slate-50 grid grid-cols-1 md:grid-cols-2 gap-3 items-start content-start">
                </div>
            </div>

        </div>

        <!-- Rodapé -->
        <footer class="text-center text-slate-500 text-[10px] font-bold uppercase tracking-widest pb-2 shrink-0">
            SIGEP · Painel Público da Recepção Unificada · Dados em tempo real
        </footer>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ── Firebase Config ──
        const firebaseConfig = {
            apiKey: "AIzaSyCrLwXmkxgeVoB8TwRI7pplCVQETGK0zkE",
            authDomain: "pauta-ce162.firebaseapp.com",
            projectId: "pauta-ce162",
            storageBucket: "pauta-ce162.appspot.com",
            messagingSenderId: "87113750208",
            appId: "1:87113750208:web:4abba0024f4d4af699bf25"
        };
        const firebaseApp = initializeApp(firebaseConfig);
        const db = getFirestore(firebaseApp);

        // ── Params ──
        const params  = new URLSearchParams(window.location.search);
        const pautasParam  = params.get('pautas');
        let recepcaoNome = params.get('nome') || 'Recepção Geral';

        const estado = {
            pautas: {},
            assistidos: {},
            ultimoChamado: null,
        };

        function esc(str) {
            if (!str) return '';
            return String(str).replace(/[&<>'"]/g, t => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[t]||t));
        }

        function horaAgora() {
            return new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
        }

        function tickRelogio() {
            const el = document.getElementById('data-hora');
            if (el) el.textContent = new Date().toLocaleString('pt-BR', { weekday: 'short', day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit' }).replace(',', ' ·');
        }
        setInterval(tickRelogio, 1000); tickRelogio();

        function tocarSom() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const notas = [[523,0,0.22],[659,0.22,0.22],[784,0.44,0.35]];
                notas.forEach(([f, i, d]) => {
                    const o = ctx.createOscillator(), g = ctx.createGain();
                    o.connect(g); g.connect(ctx.destination);
                    o.type = 'sine'; o.frequency.setValueAtTime(f, ctx.currentTime + i);
                    g.gain.setValueAtTime(0.35, ctx.currentTime + i);
                    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i + d);
                    o.start(ctx.currentTime + i); o.stop(ctx.currentTime + i + d);
                });
                setTimeout(() => ctx.close(), 1400);
            } catch(e) {}
        }

        function renderUltimoChamado(chamado) {
            if (!chamado) return;
            const wrap = document.getElementById('ultimo-chamado-wrap');
            const card = document.getElementById('ultimo-chamado-card');
            const nomeMudou = document.getElementById('uc-nome').textContent !== chamado.nome.toUpperCase();

            wrap.classList.remove('hidden');
            document.getElementById('uc-nome').textContent  = chamado.nome.toUpperCase();
            document.getElementById('uc-pauta').textContent = esc(chamado.pautaNome || chamado.local || '—');
            document.getElementById('uc-local').textContent = chamado.sala ? '🏠 ' + esc(chamado.sala) : '📋 ' + esc(chamado.local || '—');
            document.getElementById('uc-hora').textContent  = chamado.hora || horaAgora();

            if (nomeMudou) {
                document.getElementById('uc-nome').classList.remove('anim-chamado'); card.classList.remove('anim-glow');
                void card.offsetWidth;
                document.getElementById('uc-nome').classList.add('anim-chamado'); card.classList.add('anim-glow');
                tocarSom();
            }
        }

        // ── LÓGICA PRINCIPAL: RENDERIZAÇÃO UNIFICADA ──
        function renderPainelUnificado() {
            let todosAguardando = [];
            let todosEmAtendimento = [];
            let concluidos = 0;

            for (const pautaId in estado.assistidos) {
                const pauta = estado.pautas[pautaId];
                const lista = estado.assistidos[pautaId] || [];
                
                lista.forEach(a => {
                    const pessoaContexto = { 
                        ...a, 
                        nomePauta: pauta?.name || 'Geral', 
                        salaPauta: pauta?.sala || a.room || ''
                    };

                    if (a.status === 'aguardando') todosAguardando.push(pessoaContexto);
                    else if (a.status === 'emAtendimento') todosEmAtendimento.push(pessoaContexto);
                    else if (a.status === 'atendido') concluidos++;
                });
            }

            // Atualiza Contadores
            document.getElementById('g-aguardando').textContent = todosAguardando.length;
            document.getElementById('g-atendendo').textContent = todosEmAtendimento.length;
            // (Nota: o elemento 'g-atendidos' não existia no HTML, então mantive apenas os 2 principais)

            // Ordena Fila (Prioridade URGENTE primeiro, depois ordem normal)
            todosAguardando.sort((a, b) => {
                if (a.priority === 'URGENTE' && b.priority !== 'URGENTE') return -1;
                if (b.priority === 'URGENTE' && a.priority !== 'URGENTE') return 1;
                return (a.checkInOrder || 0) - (b.checkInOrder || 0);
            });

            // Ordena Atendimentos (Mais recentes no topo)
            todosEmAtendimento.sort((a,b) => new Date(b.inAttendanceTime||0) - new Date(a.inAttendanceTime||0));

            // Renderiza Em Atendimento
            const listaAtendimentoEl = document.getElementById('lista-atendimento');
            if (todosEmAtendimento.length === 0) {
                listaAtendimentoEl.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-full text-slate-400 mt-10">
                        <svg class="w-12 h-12 mb-3 opacity-20" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm.31-8.86c-1.77-.45-2.34-.94-2.34-1.67 0-.84.79-1.43 2.1-1.43 1.38 0 1.9.66 1.94 1.64h1.71c-.05-1.34-.87-2.57-2.49-2.97V5H10.9v1.69c-1.51.32-2.72 1.3-2.72 2.81 0 1.79 1.49 2.69 3.66 3.21 1.95.46 2.34 1.15 2.34 1.87 0 .53-.39 1.64-2.1 1.64-1.71 0-2.28-.92-2.36-1.66H7.98c.11 1.54 1.15 2.56 2.9 2.9V19h2.34v-1.67c1.7-.35 2.8-1.33 2.8-2.92 0-2.38-1.92-2.97-3.71-3.27z"/></svg>
                        <p class="text-xs font-bold uppercase text-center">Nenhum atendimento</p>
                    </div>`;
            } else {
                // Classes de texto ajustadas para tema claro (texto escuro)
                listaAtendimentoEl.innerHTML = todosEmAtendimento.map(a => `
                    <div class="pessoa-card em-atendimento anim-fade-up !mb-0">
                        <div class="min-w-0 flex-1">
                            <p class="text-slate-900 font-bold text-lg truncate uppercase">${esc(a.name)}</p>
                            <p class="text-indigo-600 text-[11px] font-bold mt-1 uppercase tracking-wider">${esc(a.nomePauta)}</p>
                        </div>
                        ${a.salaPauta ? `<span class="sala-badge border-indigo-200 text-indigo-700 bg-indigo-100">${esc(a.salaPauta)}</span>` : ''}
                    </div>
                `).join('');
            }

            // Renderiza Fila de Espera
            const listaEsperaEl = document.getElementById('lista-espera');
            if (todosAguardando.length === 0) {
                listaEsperaEl.innerHTML = `
                    <div class="col-span-full flex flex-col items-center justify-center mt-10 text-slate-400">
                        <svg class="w-12 h-12 mb-3 opacity-20" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        <p class="text-xs font-bold uppercase text-center">Fila vazia</p>
                    </div>`;
            } else {
                // Classes ajustadas para o tema claro
                listaEsperaEl.innerHTML = todosAguardando.map((a, i) => `
                    <div class="pessoa-card anim-card !mb-0" style="animation-delay:${i*0.03}s">
                        <span class="text-amber-500 font-black text-sm mono w-6 shrink-0 text-center">${i+1}</span>
                        <div class="min-w-0 flex-1">
                            <p class="text-slate-800 font-bold text-base truncate uppercase">${esc(a.name)}</p>
                            <p class="text-slate-500 text-[10px] font-bold mt-0.5 truncate uppercase tracking-widest">${esc(a.nomePauta)}</p>
                        </div>
                        ${a.priority === 'URGENTE' 
                            ? `<span class="pill bg-red-100 text-red-700 border border-red-200">URGENTE</span>` 
                            : ''}
                    </div>
                `).join('');
            }
        }

        async function init() {
            // Tratamento de Erro: Se não houver pautas na URL, não tenta carregar para não travar
            if (!pautasParam) {
                document.getElementById('loading').innerHTML = `
                    <div class="bg-white border border-slate-200 shadow-xl rounded-2xl p-6 md:p-10 max-w-md text-center">
                        <span class="text-4xl block mb-4">⚠️</span>
                        <h2 class="text-slate-800 text-lg font-bold mb-2">Painel não configurado</h2>
                        <p class="text-slate-600 text-sm mb-4">Faltam os identificadores na URL. Acesse utilizando o link gerado pelo painel de controle do SIGEP.</p>
                        <code class="bg-slate-100 text-slate-700 text-xs px-3 py-2 rounded-lg break-all">?pautas=ID_DA_PAUTA_AQUI</code>
                    </div>
                `;
                return;
            }

            const pautaIds = pautasParam.split(',').map(s => s.trim()).filter(Boolean);
            if (pautaIds.length === 0) return;

            document.getElementById('recepcao-nome').textContent = decodeURIComponent(recepcaoNome);
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');

            pautaIds.forEach(pautaId => {
                // Escuta os dados gerais da pauta para pegar o nome da Unidade/Órgão e o nome da pauta
                onSnapshot(doc(db, "pautas", pautaId), (snap) => {
                    if (!snap.exists()) return;
                    const d = snap.data();
                    estado.pautas[pautaId] = { id: pautaId, ...d };
                    
                    if (d.unidade) {
                        document.getElementById('recepcao-nome').textContent = esc(d.unidade);
                    }
                    renderPainelUnificado();
                });

                // Escuta as pessoas na fila da pauta
                onSnapshot(collection(db, "pautas", pautaId, "attendances"), (snap) => {
                    estado.assistidos[pautaId] = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    renderPainelUnificado();
                });

                // Escuta o sistema de chamados (Painel Sonoro/Flash)
                onSnapshot(doc(db, "pautas", pautaId, "painel", "ultimoChamado"), (snap) => {
                    if (!snap.exists()) return;
                    const data = snap.data();
                    if (!data.atual) return;

                    const tsAtual = data.atual.timestamp || 0;
                    const tsUlt = estado.ultimoChamado?.timestamp || 0;

                    if (tsAtual >= tsUlt) {
                        estado.ultimoChamado = {
                            ...data.atual,
                            pautaNome: estado.pautas[pautaId]?.name || data.atual.local || '',
                            sala: estado.pautas[pautaId]?.sala || data.atual.sala || '',
                        };
                        renderUltimoChamado(estado.ultimoChamado);
                    }
                });
            });
        }
        init();
    </script>
</body>
</html>
