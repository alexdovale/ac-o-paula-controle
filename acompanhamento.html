<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Acompanhamento de Fila - SIGEP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .scrollable-content::-webkit-scrollbar { width: 4px; }
        .scrollable-content::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .animate-pulse-slow { animation: pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite; }

        /* ── MELHORIA 3: Animações do último chamado ── */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-18px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0)   scale(1);    }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes flashBorder {
            0%, 100% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0); }
            40%       { box-shadow: 0 0 0 12px rgba(245, 158, 11, 0.35); }
        }
        @keyframes slideInCard {
            from { opacity: 0; transform: translateX(-12px); }
            to   { opacity: 1; transform: translateX(0); }
        }

        .animate-fade-in      { animation: fadeIn 0.4s ease-out forwards; }
        .animate-chamado-in   { animation: fadeInDown 0.45s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
        .animate-flash-border { animation: flashBorder 0.9s ease-out; }
        .animate-slide-card   { animation: slideInCard 0.35s ease-out forwards; }
    </style>
</head>
<body class="p-2 sm:p-4 md:p-8 min-h-screen flex flex-col">

    <!-- LOADING -->
    <div id="loading" class="fixed inset-0 bg-white flex flex-col items-center justify-center z-50">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-green-600"></div>
        <p class="mt-4 text-gray-500 font-bold uppercase text-[10px] tracking-widest">Sincronizando com o SIGEP...</p>
    </div>

    <!-- ERRO -->
    <div id="error-screen" class="hidden fixed inset-0 bg-gray-100 flex flex-col items-center justify-center p-4 z-50">
        <div class="bg-white p-8 rounded-3xl shadow-2xl max-w-md w-full text-center border-t-8 border-red-500">
            <h1 class="text-xl font-black text-gray-800 mb-2">ACESSO RESTRITO</h1>
            <p class="text-gray-500 text-sm mb-6">Esta pauta está privada ou o link expirou no SIGEP.</p>
            <button onclick="location.reload()" class="bg-green-600 text-white px-8 py-3 rounded-xl font-bold uppercase text-xs tracking-widest shadow-md">Tentar Novamente</button>
        </div>
    </div>

    <!-- CONTEÚDO PRINCIPAL -->
    <div id="app-content" class="hidden w-full max-w-7xl mx-auto flex-1 flex flex-col">

        <!-- HEADER -->
        <header class="mb-6 bg-white p-5 rounded-3xl shadow-sm border flex flex-col md:flex-row items-center justify-between gap-4">
            <div class="flex flex-col md:flex-row items-center gap-4 text-center md:text-left w-full md:w-auto">
                <div class="flex items-center gap-3 md:pr-5 md:border-r-2 border-slate-100">
                    <div class="bg-slate-50 p-2 rounded-xl border shadow-inner shrink-0">
                        <img src="https://raw.githubusercontent.com/alexdovale/ac-o-paula-controle/main/imagem.png" alt="Logo SIGEP" class="h-10 w-auto object-contain">
                    </div>
                    <div class="flex flex-col text-left">
                        <h1 class="text-2xl font-black text-slate-800 tracking-tighter leading-none">SIGEP</h1>
                        <p class="text-[8px] font-bold text-gray-400 uppercase tracking-widest mt-0.5">Gestão de Pauta</p>
                    </div>
                </div>
                <div class="mt-1 md:mt-0">
                    <h2 id="pauta-title" class="text-xl md:text-2xl font-black text-gray-800 uppercase tracking-tighter leading-tight">---</h2>
                    <div class="flex items-center justify-center md:justify-start gap-2 mt-1.5">
                        <span class="relative flex h-2 w-2">
                            <span class="animate-ping absolute h-full w-full rounded-full bg-green-400 opacity-75"></span>
                            <span class="relative rounded-full h-2 w-2 bg-green-500"></span>
                        </span>
                        <p class="text-[9px] text-gray-400 font-bold uppercase tracking-widest">Painel Público • Atendimento ao vivo</p>
                    </div>
                </div>
            </div>
            <button id="open-atendidos-btn" class="bg-slate-800 hover:bg-slate-900 text-white px-6 py-3 rounded-2xl flex flex-col items-center shadow-lg transition-all min-w-[140px] w-full md:w-auto uppercase tracking-wider">
                <span class="text-[9px] font-black uppercase opacity-70">Finalizados Hoje</span>
                <span id="total-atendidos-count" class="text-2xl font-black">0</span>
            </button>
        </header>

        <!-- ═══════════════════════════════════════════════════
             MELHORIA 3: BLOCO DO ÚLTIMO CHAMADO (animado)
        ════════════════════════════════════════════════════ -->
        <div id="ultimo-chamado-container" class="hidden mb-6">
            <div id="uc-card" class="bg-slate-900 rounded-3xl p-6 md:p-8 text-center relative overflow-hidden shadow-xl border border-slate-700">
                <div class="absolute inset-0 bg-amber-500 opacity-10 rounded-3xl animate-pulse-slow pointer-events-none"></div>
                <p class="text-[10px] sm:text-xs font-black text-amber-500 uppercase tracking-[0.3em] mb-4">📣 Chamando agora</p>
                <h2 id="uc-nome" class="text-4xl sm:text-5xl md:text-6xl font-black text-white uppercase tracking-tight leading-none mb-6 drop-shadow-md transition-all duration-300">—</h2>
                <div class="flex flex-col sm:flex-row items-center justify-center gap-3">
                    <span id="uc-local" class="bg-amber-600 text-white text-sm sm:text-base font-black px-6 py-2 rounded-xl shadow-lg border border-amber-500 uppercase tracking-wider">—</span>
                    <span id="uc-hora"  class="text-slate-400 text-xs font-bold uppercase tracking-widest mt-2 sm:mt-0">—</span>
                </div>
            </div>
            <!-- Recentes -->
            <div id="uc-recentes" class="mt-3 grid grid-cols-1 sm:grid-cols-3 gap-3 hidden"></div>
        </div>

        <!-- GRADE DE COLUNAS -->
        <div id="main-grid" class="grid grid-cols-1 gap-4 flex-1 min-h-0">

            <div id="col-aguardando" class="bg-white rounded-3xl shadow-md border overflow-hidden flex flex-col h-full min-h-[400px]">
                <div class="bg-amber-500 p-4 text-white flex justify-between items-center shadow-md shrink-0">
                    <h2 class="text-sm font-black uppercase flex items-center gap-2"><span class="text-lg">⏳</span> Fila de Espera</h2>
                    <span id="count-aguardando" class="bg-white text-amber-600 px-3 py-0.5 rounded-full text-xs font-black shadow-sm">0</span>
                </div>
                <div id="list-aguardando" class="p-3 sm:p-4 overflow-y-auto flex-1 bg-slate-50 scrollable-content"></div>
            </div>

            <div id="col-atendimento" class="hidden bg-white rounded-3xl shadow-md border overflow-hidden flex flex-col h-full min-h-[400px]">
                <div class="bg-indigo-600 p-4 text-white flex justify-between items-center shadow-md shrink-0">
                    <h2 class="text-sm font-black uppercase flex items-center gap-2"><span class="text-lg">🧑‍💻</span> Em Atendimento</h2>
                    <span id="count-atendimento" class="bg-white text-indigo-700 px-3 py-0.5 rounded-full text-xs font-black shadow-sm">0</span>
                </div>
                <div id="list-atendimento" class="p-3 sm:p-4 overflow-y-auto flex-1 space-y-2 bg-slate-50 scrollable-content"></div>
            </div>

            <div id="col-distribuicao" class="hidden bg-white rounded-3xl shadow-md border overflow-hidden flex flex-col h-full min-h-[400px]">
                <div class="bg-cyan-600 p-4 text-white flex justify-between items-center shadow-md shrink-0">
                    <h2 class="text-sm font-black uppercase flex items-center gap-2"><span class="text-lg">⚖️</span> Distribuição / Assinatura</h2>
                    <span id="count-distribuicao" class="bg-white text-cyan-700 px-3 py-0.5 rounded-full text-xs font-black shadow-sm">0</span>
                </div>
                <div id="list-distribuicao" class="p-3 sm:p-4 overflow-y-auto flex-1 space-y-2 bg-slate-50 scrollable-content"></div>
            </div>
        </div>
    </div>

    <!-- MODAL ATENDIDOS -->
    <div id="atendidos-modal" class="hidden fixed inset-0 bg-gray-900/60 backdrop-blur-sm flex items-center justify-center z-[100] p-4" onclick="this.classList.add('hidden')">
        <div class="bg-white w-full max-w-lg rounded-3xl shadow-2xl flex flex-col max-h-[80vh] overflow-hidden" onclick="event.stopPropagation()">
            <div class="p-5 border-b flex justify-between items-center bg-slate-50">
                <h2 class="text-sm font-black text-slate-800 uppercase tracking-widest flex items-center gap-2"><span>✅</span> Concluídos Hoje</h2>
                <button id="close-atendidos-btn" class="text-gray-400 hover:text-red-500 text-3xl font-bold transition-colors leading-none p-1">&times;</button>
            </div>
            <div id="list-atendidos-content" class="p-4 overflow-y-auto flex-1 space-y-2 bg-gray-50 scrollable-content"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp }    from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection, setDoc, serverTimestamp }
            from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { initializeAppCheck, ReCaptchaV3Provider }
            from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app-check.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCrLwXmkxgeVoB8TwRI7pplCVQETGK0zkE",
            authDomain: "pauta-ce162.firebaseapp.com",
            projectId: "pauta-ce162",
            storageBucket: "pauta-ce162.appspot.com",
            messagingSenderId: "87113750208",
            appId: "1:87113750208:web:4abba0024f4d4af699bf25"
        };

        const firebaseApp = initializeApp(firebaseConfig);
        const db = getFirestore(firebaseApp);

        try {
            initializeAppCheck(firebaseApp, {
                provider: new ReCaptchaV3Provider('6LeWfTgsAAAAAHy1y3TFZ1EH-L3btwHsult6Rgy4'),
                isTokenAutoRefreshEnabled: true
            });
        } catch(e) {}

        const urlParams = new URLSearchParams(window.location.search);
        const pId = urlParams.get('id');

        // ════════════════════════════════════════════════════════
        // ESTADO GLOBAL
        // ════════════════════════════════════════════════════════
        let ultimoChamadoAtual = null;  // cache do último chamado exibido
        let maskNames = false;

        // ════════════════════════════════════════════════════════
        // HELPERS
        // ════════════════════════════════════════════════════════
        function escapeHTML(str) {
            if (!str) return '';
            return str.replace(/[&<>'"]/g,
                tag => ({ '&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;' }[tag] || tag)
            );
        }

        function formatNameMasked(name, mask) {
            if (!name) return '—';
            if (!mask) return escapeHTML(name);
            const connectors = ['de','da','do','dos','das'];
            return escapeHTML(
                name.trim().split(/\s+/).map((part, i) => {
                    if (i === 0) return part;
                    if (connectors.includes(part.toLowerCase())) return part;
                    return part.charAt(0).toUpperCase() + '.';
                }).join(' ')
            );
        }

        // ════════════════════════════════════════════════════════
        // MELHORIA 4: SOM DE CHAMADO
        // Gera um "ding" via Web Audio API — sem arquivo externo
        // ════════════════════════════════════════════════════════
        function tocarSomChamado() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();

                const tocarNota = (freq, inicio, duracao, ganho = 0.4) => {
                    const osc  = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, ctx.currentTime + inicio);
                    gain.gain.setValueAtTime(ganho, ctx.currentTime + inicio);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + inicio + duracao);
                    osc.start(ctx.currentTime + inicio);
                    osc.stop(ctx.currentTime + inicio + duracao);
                };

                // Três notas ascendentes — tipo campainha de recepção
                tocarNota(523, 0,    0.22); // C5
                tocarNota(659, 0.22, 0.22); // E5
                tocarNota(784, 0.44, 0.35); // G5

                setTimeout(() => ctx.close(), 1200);
            } catch(e) {
                console.warn('Som indisponível:', e);
            }
        }

        // ════════════════════════════════════════════════════════
        // MELHORIA 3: ANIMAR ÚLTIMO CHAMADO
        // ════════════════════════════════════════════════════════
        function animarUltimoChamado() {
            const card  = document.getElementById('uc-card');
            const nomeEl = document.getElementById('uc-nome');
            if (!card || !nomeEl) return;

            // Remove e re-adiciona a classe para reiniciar a animação
            nomeEl.classList.remove('animate-chamado-in');
            card.classList.remove('animate-flash-border');

            // Força reflow para reiniciar
            void nomeEl.offsetWidth;
            void card.offsetWidth;

            nomeEl.classList.add('animate-chamado-in');
            card.classList.add('animate-flash-border');
        }

        // ════════════════════════════════════════════════════════
        // MELHORIA 1 + 2: RENDERIZAR ÚLTIMO CHAMADO VIA FIRESTORE
        // ════════════════════════════════════════════════════════
        function renderUltimoChamado(chamado, historico) {
            if (!chamado) return;

            const container = document.getElementById('ultimo-chamado-container');
            const nomeEl    = document.getElementById('uc-nome');
            const localEl   = document.getElementById('uc-local');
            const horaEl    = document.getElementById('uc-hora');
            const recentesEl = document.getElementById('uc-recentes');

            const novoNome = formatNameMasked(chamado.nome, maskNames);

            // Só anima e toca som se o nome mudou
            const nomeMudou = nomeEl.textContent !== novoNome && novoNome !== '—';

            container.classList.remove('hidden');
            nomeEl.textContent  = novoNome;
            localEl.textContent = chamado.local || '—';
            horaEl.textContent  = chamado.hora  || '';

            if (nomeMudou) {
                animarUltimoChamado();
                tocarSomChamado();
            }

            // Recentes (exclui o atual)
            const anteriores = (historico || []).slice(1, 4);

            if (anteriores.length > 0) {
                recentesEl.classList.remove('hidden');
                recentesEl.innerHTML = anteriores.map((c, i) => `
                    <div class="bg-white border border-slate-200 rounded-2xl px-4 py-3 text-center shadow-sm animate-slide-card"
                         style="animation-delay: ${i * 0.07}s">
                        <p class="text-slate-400 text-[9px] font-black uppercase tracking-widest mb-1">Chamado Anterior</p>
                        <p class="text-slate-800 font-bold text-sm truncate uppercase">${formatNameMasked(c.nome, maskNames)}</p>
                        <p class="text-slate-500 text-[10px] mt-0.5 font-semibold">${escapeHTML(c.local || '')} · ${escapeHTML(c.hora || '')}</p>
                    </div>
                `).join('');
            } else {
                recentesEl.classList.add('hidden');
            }
        }

        // ════════════════════════════════════════════════════════
        // MELHORIA 1: LISTENER FIRESTORE PARA ÚLTIMO CHAMADO
        // Funciona em qualquer dispositivo, inclusive TV
        // ════════════════════════════════════════════════════════
        function iniciarListenerUltimoChamado(pautaId) {
            const chamadoRef = doc(db, "pautas", pautaId, "painel", "ultimoChamado");
            onSnapshot(chamadoRef, (snap) => {
                if (!snap.exists()) return;
                const data = snap.data();
                renderUltimoChamado(data.atual, data.historico || []);
            });
        }

        // Também escuta o evento local (mesma aba/máquina) para resposta imediata
        window.addEventListener('sigep:chamado', (e) => {
            if (e.detail) renderUltimoChamado(e.detail, []);
        });

        // ════════════════════════════════════════════════════════
        // CARDS DA FILA
        // ════════════════════════════════════════════════════════
        const createCardHTML = (a, i, color, type, data) => {
            const numAg  = a.numeroAgendamento || a.numAgendamento || '';
            const horaAg = a.scheduledTime || '';

            let blocos = '';
            if (numAg || horaAg) {
                blocos = `<div class="flex flex-wrap gap-1 mt-1.5">`;
                if (numAg)  blocos += `<span class="inline-flex items-center gap-0.5 px-1.5 py-0.5 rounded text-[9px] font-mono font-bold bg-blue-50 text-blue-600 border border-blue-100">📅 Nº: ${escapeHTML(numAg)}</span>`;
                if (horaAg) blocos += `<span class="inline-flex items-center gap-0.5 px-1.5 py-0.5 rounded text-[9px] font-mono font-bold bg-slate-100 text-slate-600 border border-slate-200">⏰ ${escapeHTML(horaAg)}</span>`;
                blocos += `</div>`;
            }

            return `
                <div class="bg-white p-3.5 rounded-2xl border-l-8 ${a.priority === 'URGENTE' ? 'border-red-500 bg-red-50/50' : color} shadow-sm flex justify-between items-center transition-all mb-2 border border-slate-200/60">
                    <div class="min-w-0 flex-grow pr-2">
                        <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest leading-none mb-1">${type === 'wait' ? (i+1)+'º DA FILA' : 'PROCESSO ATIVO'}</p>
                        <h4 class="font-bold text-slate-800 text-sm uppercase truncate leading-tight">${formatNameMasked(a.name, data.maskNames)}</h4>
                        ${blocos}
                    </div>
                    <div class="flex flex-col items-end shrink-0 gap-1">
                        <span class="bg-slate-800 text-white text-[8px] font-black px-2 py-1 rounded-md uppercase tracking-wider">${escapeHTML(a.room) || 'GERAL'}</span>
                        ${a.documentState === 'saved' ? '<span class="text-[8px] font-black text-emerald-700 bg-emerald-50 border border-emerald-200 px-1.5 py-0.5 rounded-md uppercase">Docs OK</span>' : ''}
                    </div>
                </div>`;
        };

        // ════════════════════════════════════════════════════════
        // INICIALIZAÇÃO PRINCIPAL
        // ════════════════════════════════════════════════════════
        if (pId) {
            // Listener da pauta (config + dados)
            onSnapshot(doc(db, "pautas", pId), (snap) => {
                if (!snap.exists() || !snap.data().isPublic) {
                    document.getElementById('loading').classList.add('hidden');
                    document.getElementById('error-screen').classList.remove('hidden');
                    return;
                }

                const data = snap.data();
                maskNames = data.maskNames || false;
                window.currentPautaMaskNames = maskNames;

                document.getElementById('pauta-title').textContent = data.name;
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('app-content').classList.remove('hidden');

                // Colunas visíveis
                const grid = document.getElementById('main-grid');
                let cols = 1;
                if (data.useDelegationFlow) { document.getElementById('col-atendimento').classList.remove('hidden'); cols++; }
                else { document.getElementById('col-atendimento').classList.add('hidden'); }
                if (data.useDistributionFlow) { document.getElementById('col-distribuicao').classList.remove('hidden'); cols++; }
                else { document.getElementById('col-distribuicao').classList.add('hidden'); }
                grid.className = `grid grid-cols-1 ${cols > 1 ? 'lg:grid-cols-' + cols : ''} gap-4 flex-1 min-h-0`;
            });

            // MELHORIA 1: Listener do último chamado via Firestore
            iniciarListenerUltimoChamado(pId);

            // Listener dos atendimentos
            onSnapshot(collection(db, "pautas", pId, "attendances"), (attSnap) => {
                const pautaSnap = document.getElementById('pauta-title').textContent !== '---';
                if (!pautaSnap) return; // aguarda a pauta carregar

                // Lê config atual do DOM (já carregada pelo listener da pauta)
                const ordemAtendimento = window._sigepOrdem || 'padrao';
                const tipo = window._sigepTipo || 'agendamento';

                const items = attSnap.docs.map(d => ({ id: d.id, ...d.data() }));

                const ag   = items.filter(i => i.status === 'aguardando').sort((a, b) => {
                    if (a.priority === 'URGENTE' && b.priority !== 'URGENTE') return -1;
                    if (b.priority === 'URGENTE' && a.priority !== 'URGENTE') return 1;
                    if (ordemAtendimento === 'manual') return (a.manualIndex || 0) - (b.manualIndex || 0);
                    return (a.checkInOrder || 0) - (b.checkInOrder || 0);
                });
                const serv = items.filter(i => i.status === 'emAtendimento').sort((a, b) => new Date(b.inAttendanceTime) - new Date(a.inAttendanceTime));
                const dist = items.filter(i => i.status === 'aguardandoDistribuicao' || i.status === 'aguardandoCorrecao');
                const done = items.filter(i => i.status === 'atendido').sort((a, b) => new Date(b.attendedAt || b.attendedTime) - new Date(a.attendedAt || a.attendedTime));

                document.getElementById('count-aguardando').textContent  = ag.length;
                document.getElementById('count-atendimento').textContent = serv.length;
                document.getElementById('count-distribuicao').textContent = dist.length;
                document.getElementById('total-atendidos-count').textContent = done.length;

                // Fila de espera
                const elAg = document.getElementById('list-aguardando');
                if (ag.length === 0) {
                    elAg.innerHTML = '<div class="flex items-center justify-center py-20"><p class="text-gray-300 text-[10px] font-black uppercase tracking-widest">Fila Limpa</p></div>';
                } else if (tipo === 'multisala') {
                    const rooms = window._sigepRooms || [];
                    let html = '';
                    rooms.forEach(room => {
                        const roomItems = ag.filter(a => a.room === room);
                        if (roomItems.length === 0) return;
                        html += `
                            <div class="mb-4 bg-white rounded-2xl border border-gray-200 overflow-hidden shadow-sm">
                                <div class="bg-slate-50 px-4 py-2 border-b border-gray-200 flex justify-between items-center">
                                    <span class="text-xs font-black text-slate-700 uppercase tracking-widest flex items-center gap-1.5">🏢 ${escapeHTML(room)}</span>
                                    <span class="bg-slate-800 text-white text-[10px] font-bold px-2 py-0.5 rounded-full">${roomItems.length}</span>
                                </div>
                                <div class="p-2 bg-slate-50/30">${roomItems.map((a, i) => createCardHTML(a, i, 'border-amber-500', 'wait', { maskNames })).join('')}</div>
                            </div>`;
                    });
                    const noRoom = ag.filter(a => !a.room || !rooms.includes(a.room));
                    if (noRoom.length > 0) {
                        html += `
                            <div class="mb-4 bg-white rounded-2xl border border-gray-200 overflow-hidden shadow-sm">
                                <div class="bg-red-50 px-4 py-2 border-b border-red-100 flex justify-between items-center">
                                    <span class="text-xs font-black text-red-900 uppercase tracking-widest flex items-center gap-1.5">⚠️ Triagem Geral</span>
                                    <span class="bg-red-600 text-white text-[10px] font-bold px-2 py-0.5 rounded-full">${noRoom.length}</span>
                                </div>
                                <div class="p-2 bg-slate-50/30">${noRoom.map((a, i) => createCardHTML(a, i, 'border-amber-500', 'wait', { maskNames })).join('')}</div>
                            </div>`;
                    }
                    elAg.innerHTML = html;
                } else {
                    elAg.innerHTML = ag.map((a, i) => createCardHTML(a, i, 'border-amber-400', 'wait', { maskNames })).join('');
                }

                // Em atendimento
                document.getElementById('list-atendimento').innerHTML = serv.length
                    ? serv.map((a, i) => createCardHTML(a, i, 'border-indigo-500', 'pulse', { maskNames })).join('')
                    : '<div class="text-center py-10"><p class="text-gray-300 text-[10px] font-black uppercase tracking-widest">Ninguém em atendimento</p></div>';

                // Distribuição
                document.getElementById('list-distribuicao').innerHTML = dist.length
                    ? dist.map((a, i) => createCardHTML(a, i, 'border-cyan-500', 'normal', { maskNames })).join('')
                    : '<div class="text-center py-10"><p class="text-gray-300 text-[10px] font-black uppercase tracking-widest">Nenhum processo aguardando</p></div>';

                // Modal atendidos
                document.getElementById('list-atendidos-content').innerHTML = done.map(d => `
                    <div class="bg-white p-3 rounded-xl border border-gray-100 shadow-sm flex justify-between items-center text-sm mb-2 hover:bg-gray-50 transition-colors">
                        <span class="font-bold text-gray-700 uppercase text-xs truncate">${formatNameMasked(d.name, maskNames)}</span>
                        <span class="text-[9px] font-black text-emerald-700 bg-emerald-50 border border-emerald-200 px-2.5 py-1 rounded-md uppercase tracking-widest">Concluído</span>
                    </div>`).join('')
                    || '<p class="text-center text-gray-400 py-10 uppercase text-xs font-bold">Nenhum atendimento finalizado hoje.</p>';
            });

            // Salva config da pauta em variáveis globais para o listener de atendimentos usar
            onSnapshot(doc(db, "pautas", pId), (snap) => {
                if (!snap.exists()) return;
                const d = snap.data();
                window._sigepOrdem = d.ordemAtendimento || 'padrao';
                window._sigepTipo  = d.type || 'agendamento';
                window._sigepRooms = d.rooms || d.customRooms || [];
            });
        }

        // Botões modais
        document.getElementById('open-atendidos-btn').onclick = () => document.getElementById('atendidos-modal').classList.remove('hidden');
        document.getElementById('close-atendidos-btn').onclick = () => document.getElementById('atendidos-modal').classList.add('hidden');
    </script>
</body>
</html>
