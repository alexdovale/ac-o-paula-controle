<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Triagem Digital - SIGEP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .sigep-gradient { background: linear-gradient(135deg, #059669 0%, #047857 100%); }
        .custom-checkbox:checked + div { background-color: #059669; border-color: #059669; }
        .custom-checkbox:checked + div svg { display: block; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 font-sans pb-10">

    <div id="loading-screen" class="fixed inset-0 bg-white z-50 flex flex-col items-center justify-center">
        <div class="animate-spin rounded-full h-12 w-12 border-b-4 border-green-600 mb-4"></div>
        <p class="text-sm font-bold text-slate-500 animate-pulse">Carregando formulário...</p>
    </div>

    <div class="max-w-md mx-auto p-4 hidden" id="app-content">
        <div class="text-center py-6">
            <h1 class="text-2xl font-black text-slate-800 tracking-tight">Triagem Digital</h1>
            <p class="text-sm text-slate-500">Preencha os campos abaixo para o seu atendimento.</p>
        </div>

        <form id="form-captacao" class="space-y-6">
            <section class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                <h2 class="text-xs font-black text-green-700 uppercase mb-4 border-b pb-2">1. Seus Dados</h2>
                <input type="text" id="nome-assistido" required placeholder="Nome Completo" class="w-full p-3 bg-slate-50 border rounded-xl mb-3 text-sm">
                <div class="grid grid-cols-2 gap-3">
                    <input type="text" id="cpf-assistido" placeholder="CPF" class="w-full p-3 bg-slate-50 border rounded-xl text-sm">
                    <input type="tel" id="telefone-assistido" placeholder="WhatsApp" class="w-full p-3 bg-slate-50 border rounded-xl text-sm">
                </div>
            </section>

            <section class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                <h2 class="text-xs font-black text-green-700 uppercase mb-4 border-b pb-2">2. Documentos</h2>
                <div id="checklist-area" class="space-y-2 text-xs"></div>
            </section>

            <section class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                <h2 class="text-xs font-black text-red-600 uppercase mb-4 border-b pb-2">3. Dados da Parte Contrária (Réu)</h2>
                <input type="text" id="reu-nome" placeholder="Nome do Réu" class="w-full p-3 bg-slate-50 border rounded-xl mb-2 text-sm">
                <input type="text" id="reu-rua" placeholder="Endereço (Rua, nº)" class="w-full p-3 bg-slate-50 border rounded-xl mb-2 text-sm">
                <input type="text" id="reu-bairro" placeholder="Bairro" class="w-full p-3 bg-slate-50 border rounded-xl text-sm">
            </section>

            <section class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                <h2 class="text-xs font-black text-green-700 uppercase mb-4 border-b pb-2">4. Gastos Mensais</h2>
                <div id="gastos-container" class="space-y-2 text-xs"></div>
            </section>

            <button type="submit" id="btn-enviar" class="w-full sigep-gradient text-white font-black py-4 rounded-2xl shadow-lg">ENVIAR DADOS</button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { firebaseConfig } from './js/config.js';
        import { documentsData, EXPENSE_CATEGORIES } from './js/detalhes.js';

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let pautaId, assistedId, actionKey;

        async function init() {
            const params = new URLSearchParams(window.location.search);
            pautaId = params.get('pid');
            assistedId = params.get('aid');

            // Renderiza Gastos
            const containerGastos = document.getElementById('gastos-container');
            EXPENSE_CATEGORIES.forEach(cat => {
                containerGastos.innerHTML += `
                    <div class="flex justify-between items-center">
                        <span class="font-bold text-slate-600">${cat.label}</span>
                        <input type="text" id="gasto-${cat.id}" class="w-24 p-1 border rounded text-right" placeholder="R$ 0,00">
                    </div>
                `;
            });

            // Busca Dados
            const docSnap = await getDoc(doc(db, "pautas", pautaId, "attendances", assistedId));
            if (docSnap.exists()) {
                const data = docSnap.data();
                document.getElementById('nome-assistido').value = data.name || '';
                if (data.documentChecklist?.action) {
                    actionKey = data.documentChecklist.action;
                    renderChecklist(actionKey, data.documentChecklist.checkedIds || []);
                }
                document.getElementById('loading-screen').classList.add('hidden');
                document.getElementById('app-content').classList.remove('hidden');
            }
        }

        function renderChecklist(key, savedIds) {
            const container = document.getElementById('checklist-area');
            const data = documentsData[key];
            data.sections.forEach((sec, sIdx) => {
                sec.docs.forEach((docItem, dIdx) => {
                    if (typeof docItem === 'string') {
                        const id = `doc-${key}-${sIdx}-${dIdx}`;
                        container.innerHTML += `<label class="flex gap-2 p-2 border rounded-lg"><input type="checkbox" id="${id}" class="citizen-checkbox" ${savedIds.includes(id) ? 'checked' : ''}>${docItem}</label>`;
                    }
                });
            });
        }

        document.getElementById('form-captacao').onsubmit = async (e) => {
            e.preventDefault();
            const gastos = {};
            EXPENSE_CATEGORIES.forEach(cat => gastos[cat.id] = document.getElementById(`gasto-${cat.id}`).value);

            await updateDoc(doc(db, "pautas", pautaId, "attendances", assistedId), {
                name: document.getElementById('nome-assistido').value,
                cpf: document.getElementById('cpf-assistido').value,
                telefone: document.getElementById('telefone-assistido').value,
                "documentChecklist.checkedIds": Array.from(document.querySelectorAll('.citizen-checkbox:checked')).map(cb => cb.id),
                "documentChecklist.reuData": {
                    nome: document.getElementById('reu-nome').value,
                    rua: document.getElementById('reu-rua').value,
                    bairro: document.getElementById('reu-bairro').value
                },
                "documentChecklist.expenseData": gastos,
                documentState: 'pre_triagem_concluida'
            });
            alert("Dados enviados!");
            window.location.reload();
        };

        init();
    </script>
</body>
</html>
