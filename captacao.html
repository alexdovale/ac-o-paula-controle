<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Triagem Digital - SIGEP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .sigep-gradient { background: linear-gradient(135deg, #059669 0%, #047857 100%); }
        .custom-checkbox:checked + div { background-color: #059669; border-color: #059669; }
        .custom-checkbox:checked + div svg { display: block; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 font-sans pb-10">

    <div id="loading-screen" class="fixed inset-0 bg-white z-50 flex flex-col items-center justify-center">
        <div class="animate-spin rounded-full h-12 w-12 border-b-4 border-green-600 mb-4"></div>
        <p class="text-sm font-bold text-slate-500 animate-pulse">Carregando formulário...</p>
    </div>

    <div class="max-w-md mx-auto p-4 hidden" id="app-content">
        <div class="text-center py-6">
            <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-3 shadow-inner">
                <span class="text-2xl">⚖️</span>
            </div>
            <h1 class="text-2xl font-black text-slate-800 tracking-tight">Triagem Digital</h1>
            <p class="text-sm text-slate-500 mt-1">Preencha os dados abaixo para adiantar seu atendimento.</p>
        </div>

        <form id="form-captacao" class="space-y-6">
            
            <section class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                <h2 class="text-xs font-black text-green-700 uppercase mb-4 border-b pb-2">1. Seus Dados</h2>
                <input type="text" id="nome-assistido" required placeholder="Nome Completo" class="w-full p-3 bg-slate-50 border rounded-xl mb-3 text-sm">
                <div class="grid grid-cols-2 gap-3">
                    <input type="text" id="cpf-assistido" placeholder="CPF" class="w-full p-3 bg-slate-50 border rounded-xl text-sm" inputmode="numeric">
                    <input type="tel" id="telefone-assistido" placeholder="WhatsApp" class="w-full p-3 bg-slate-50 border rounded-xl text-sm" inputmode="numeric">
                </div>
            </section>

            <section class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                <h2 class="text-xs font-black text-green-700 uppercase mb-4 border-b pb-2">2. Documentos</h2>
                <div id="checklist-area" class="space-y-2 text-xs"></div>
            </section>

            <section class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                <h2 class="text-xs font-black text-red-600 uppercase mb-4 border-b pb-2">3. Dados do Réu</h2>
                <div class="space-y-2">
                    <input type="text" id="reu-nome" placeholder="Nome Completo do Réu" class="w-full p-3 bg-slate-50 border rounded-xl text-sm">
                    <input type="text" id="reu-cpf" placeholder="CPF do Réu" class="w-full p-3 bg-slate-50 border rounded-xl text-sm">
                    <input type="text" id="reu-rua" placeholder="Rua / Logradouro" class="w-full p-3 bg-slate-50 border rounded-xl text-sm">
                    <div class="grid grid-cols-2 gap-2">
                        <input type="text" id="reu-numero" placeholder="Número" class="w-full p-3 bg-slate-50 border rounded-xl text-sm">
                        <input type="text" id="reu-bairro" placeholder="Bairro" class="w-full p-3 bg-slate-50 border rounded-xl text-sm">
                    </div>
                    <input type="text" id="reu-empresa" placeholder="Empresa onde trabalha" class="w-full p-3 bg-slate-50 border rounded-xl text-sm">
                </div>
            </section>

            <section class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                <h2 class="text-xs font-black text-green-700 uppercase mb-4 border-b pb-2">4. Planilha de Gastos</h2>
                <div id="gastos-container" class="space-y-3"></div>
            </section>

            <button type="submit" id="btn-enviar" class="w-full sigep-gradient text-white font-black py-4 rounded-2xl shadow-lg active:scale-95 transition-transform">
                ENVIAR DADOS
            </button>
        </form>
    </div>

    <div id="success-screen" class="hidden fixed inset-0 bg-green-600 z-50 flex flex-col items-center justify-center p-6 text-center text-white">
        <h2 class="text-3xl font-black mb-2">Dados Enviados!</h2>
        <p>Aguarde ser chamado pela nossa equipe.</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { firebaseConfig } from './js/config.js';
        import { documentsData, EXPENSE_CATEGORIES } from './js/detalhes.js';

        const db = getFirestore(initializeApp(firebaseConfig));
        const params = new URLSearchParams(window.location.search);
        const pid = params.get('pid');
        const aid = params.get('aid');

        async function init() {
            const containerGastos = document.getElementById('gastos-container');
            EXPENSE_CATEGORIES.forEach(cat => {
                containerGastos.innerHTML += `
                    <div class="flex justify-between items-center text-xs">
                        <span class="font-bold text-slate-600">${cat.label}</span>
                        <input type="text" id="gasto-${cat.id}" class="w-24 p-2 border rounded-lg text-right" placeholder="R$ 0,00">
                    </div>
                `;
            });

            try {
                const docSnap = await getDoc(doc(db, "pautas", pid, "attendances", aid));
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    document.getElementById('nome-assistido').value = data.name || '';
                    if (data.documentChecklist?.action) {
                        renderChecklist(data.documentChecklist.action, data.documentChecklist.checkedIds || []);
                    }
                    document.getElementById('loading-screen').classList.add('hidden');
                    document.getElementById('app-content').classList.remove('hidden');
                }
            } catch (err) { console.error(err); }
        }

        function renderChecklist(key, savedIds) {
            const container = document.getElementById('checklist-area');
            const data = documentsData[key];
            data.sections.forEach((sec, sIdx) => {
                sec.docs.forEach((docItem, dIdx) => {
                    if (typeof docItem === 'string') {
                        const id = `doc-${key}-${sIdx}-${dIdx}`;
                        container.innerHTML += `
                            <label class="flex items-center gap-2 p-2 border rounded-lg cursor-pointer">
                                <input type="checkbox" id="${id}" class="citizen-checkbox" ${savedIds.includes(id) ? 'checked' : ''}>
                                ${docItem}
                            </label>`;
                    }
                });
            });
        }

        document.getElementById('form-captacao').onsubmit = async (e) => {
            e.preventDefault();
            const gastos = {};
            EXPENSE_CATEGORIES.forEach(cat => gastos[cat.id] = document.getElementById(`gasto-${cat.id}`).value);
            
            await updateDoc(doc(db, "pautas", pid, "attendances", aid), {
                name: document.getElementById('nome-assistido').value,
                cpf: document.getElementById('cpf-assistido').value,
                telefone: document.getElementById('telefone-assistido').value,
                "documentChecklist.checkedIds": Array.from(document.querySelectorAll('.citizen-checkbox:checked')).map(cb => cb.id),
                "documentChecklist.reuData": {
                    nome: document.getElementById('reu-nome').value,
                    rua: document.getElementById('reu-rua').value,
                    bairro: document.getElementById('reu-bairro').value,
                    cpf: document.getElementById('reu-cpf').value,
                    empresa: document.getElementById('reu-empresa').value
                },
                "documentChecklist.expenseData": gastos,
                documentState: 'pre_triagem_concluida'
            });
            document.getElementById('app-content').classList.add('hidden');
            document.getElementById('success-screen').classList.remove('hidden');
        };

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
