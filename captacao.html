<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Triagem Digital - SIGEP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .sigep-gradient { background: linear-gradient(135deg, #059669 0%, #047857 100%); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <div class="max-w-md mx-auto p-4">
        <!-- Logo e Cabeçalho -->
        <div class="text-center py-6">
            <img src="assets/logo-sigep.png" alt="Logo SIGEP" class="h-16 mx-auto mb-4">
            <h1 class="text-xl font-black text-slate-800">Triagem Digital</h1>
            <p class="text-sm text-slate-500">Insira seus dados preliminares para agilizar seu atendimento.</p>
        </div>

        <form id="form-captacao" class="space-y-4">
            <!-- Dados do Assistido -->
            <section class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                <label class="block text-xs font-bold text-slate-400 uppercase mb-2">Nome Completo</label>
                <input type="text" id="nome" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl mb-4 focus:ring-2 focus:ring-green-500 outline-none">
                
                <label class="block text-xs font-bold text-slate-400 uppercase mb-2">CPF</label>
                <input type="text" id="cpf" placeholder="000.000.000-00" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-green-500 outline-none">
            </section>

            <!-- Checklist Dinâmico -->
            <div id="checklist-area" class="space-y-4">
                <h2 class="text-sm font-bold text-slate-700 px-1">Documentos necessários:</h2>
                <div id="lista-docs" class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                    <!-- Gerado pelo JS -->
                </div>
            </div>

            <button type="submit" class="w-full sigep-gradient text-white font-black py-4 rounded-2xl shadow-lg active:scale-95 transition-transform">
                ENVIAR DADOS
            </button>
        </form>
    </div>

    <!-- Script de Inicialização -->

</body>
</html>
